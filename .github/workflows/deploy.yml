name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Prepare docs
        run: python scripts/prepare_docs.py

      - name: Build site
        run: mkdocs build --clean --verbose

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy site/ to gh-pages
        run: |
          set -euo pipefail
          rm -rf /tmp/gh-pages-deploy
          git clone --branch gh-pages "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" /tmp/gh-pages-deploy
          find /tmp/gh-pages-deploy -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a site/. /tmp/gh-pages-deploy/
          cd /tmp/gh-pages-deploy
          touch .nojekyll
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          git commit -m "Deploy ${{ github.sha }}"
          git push origin gh-pages
